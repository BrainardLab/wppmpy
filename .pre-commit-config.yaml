repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
    -   id: ruff
        args:
        - --fix
    -   id: ruff-format
-   repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    -   id: nbqa-mypy
        additional_dependencies: [mypy==1.19.1]
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
    -   id: mypy
        pass_filenames: false
        args:
        - --exclude
        - (^|/)(\.venv|venv)(/|$)
        - .
        files: \.py$
