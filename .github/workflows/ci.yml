name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Create & use virtualenv (robust, remove preexisting)
        shell: bash -l {0}
        run: |
          set -euo pipefail

          echo ">>> python info"
          python -V
          which python
          python -c "import sys; print('sys.executable=', sys.executable, 'sys.prefix=', sys.prefix, 'version=', sys.version)"

          # Remove any pre-existing .venv (if it was committed or left behind)
          if [ -e ".venv" ]; then
            echo "Removing pre-existing .venv"
            rm -rf .venv
            echo "Removed .venv"
          fi

          echo "Attempting to create venv at .venv (try python then python3)"
          if python -m venv .venv > /dev/null 2>&1; then
            echo "Created venv with 'python -m venv .venv'"
          elif python3 -m venv .venv > /dev/null 2>&1; then
            echo "Created venv with 'python3 -m venv .venv'"
          else
            echo "ERROR: failed to create venv with both 'python' and 'python3'. Dumping diagnostics..."
            echo "---- python -m venv stdout/stderr ----"
            python -m venv .venv || true
            python3 -m venv .venv || true
            echo "---- workspace listing ----"
            ls -la
            echo "---- find top-level ----"
            find . -maxdepth 2 -ls || true
            exit 1
          fi

          echo "Listing .venv contents (top-level):"
          ls -la .venv || true
          echo "Listing .venv/bin:"
          ls -la .venv/bin || true

          VENV_PY=.venv/bin/python
          if [ ! -x "$VENV_PY" ]; then
            echo "ERROR: $VENV_PY not executable or missing. Showing find results:"
            find .venv -maxdepth 4 -ls || true
            exit 1
          fi

          echo "Using venv python: $VENV_PY"
          $VENV_PY -V
          $VENV_PY -m pip --version || (echo "pip missing; attempting ensurepip" && $VENV_PY -m ensurepip --upgrade || true)

          echo "Upgrading pip and installing tools"
          $VENV_PY -m pip install --upgrade pip
          $VENV_PY -m pip install ruff mypy

      - name: Run Ruff (lint + format check)
        shell: bash -l {0}
        run: |
          .venv/bin/python -m ruff --version || echo "ruff not installed"
          .venv/bin/python -m ruff check .

      - name: Run mypy (type check)
        shell: bash -l {0}
        run: |
          .venv/bin/python -m mypy --version || echo "mypy not installed"
          .venv/bin/python -m mypy .