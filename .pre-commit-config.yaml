repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
repos:

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.5
  hooks:

  - id: ruff
    args: ["--fix"]
  - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.11.0
  hooks:
    - id: mypy
      args: ["--exclude", "(^|/)(\\.venv|venv)(/|$)", "."]
      files: \.py$
